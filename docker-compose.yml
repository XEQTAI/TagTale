version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: tagtale-postgres
    environment:
      POSTGRES_USER: tagtale
      POSTGRES_PASSWORD: tagtale
      POSTGRES_DB: tagtale
    ports:
      - '5432:5432'
    volumes:
      - tagtale-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tagtale']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tagtale-pgdata:
